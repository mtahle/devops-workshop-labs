    padding:10px 20px;background:#12163a;flex-shrink:0;
  }
  #panel-slide-label{ font-size:13px;font-weight:700;color:#38C0C8;letter-spacing:.08em;text-transform:uppercase; }
  #panel-time{ font-size:13px;color:#9aa3c4; }
  #panel-toggle{
    background:none;border:none;color:#9aa3c4;cursor:pointer;
    font-size:20px;line-height:1;padding:0 4px;
  }
  #panel-toggle:hover{ color:#fff; }

  #panel-body{
    display:grid;grid-template-columns:1fr 1fr 1fr;
    gap:0;overflow:hidden;flex:1;
  }
  .panel-col{ padding:14px 20px;overflow-y:auto;border-right:1px solid rgba(255,255,255,.08); }
  .panel-col:last-child{ border-right:none; }
  .panel-col-title{
    font-size:10px;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;color:#38C0C8;margin:0 0 8px;
  }
  .panel-col ul{ margin:0;padding-left:16px; }
  .panel-col li{ font-size:12px;line-height:1.5;color:#ccd0e8;margin-bottom:5px; }
  .panel-prompt{
    font-size:12px;line-height:1.45;color:#f0d060;
    background:rgba(240,208,96,.08);border-radius:6px;
    padding:8px 12px;margin-top:4px;
  }
  .panel-tip{
    font-size:12px;line-height:1.45;color:#a0e8b0;
    background:rgba(56,192,200,.08);border-radius:6px;
    padding:8px 12px;margin-top:4px;
  }
  .panel-empty{ font-size:12px;color:#6e7490;font-style:italic; }
`;

const styleEl = document.createElement('style');
styleEl.textContent = CSS;
document.head.appendChild(styleEl);

/* Present button */
const btn = document.createElement('button');
btn.id = 'present-btn';
btn.textContent = '⎋ Present on 2nd screen';
btn.onclick = () => {
  const aw = window.open(location.href + '?audience', '_blank');
  setTimeout(() => {
    ch.postMessage({ index: currentIndex });
  }, 2000);
};
document.body.appendChild(btn);

/* Notes panel */
const panel = document.createElement('div');
panel.id = 'presenter-panel';
panel.innerHTML = `
  <div id="panel-header">
    <span id="panel-slide-label">Slide</span>
    <span id="panel-time"></span>
    <button id="panel-toggle" title="Toggle notes panel">▲</button>
  </div>
  <div id="panel-body">
    <div class="panel-col">
      <p class="panel-col-title">Talking points</p>
      <ul id="panel-keys"></ul>
    </div>
    <div class="panel-col">
      <p class="panel-col-title">Discussion prompt</p>
      <div id="panel-prompt"></div>
    </div>
    <div class="panel-col">
      <p class="panel-col-title">Delivery tip</p>
      <div id="panel-tip"></div>
    </div>
  </div>
`;
document.body.appendChild(panel);

let panelOpen = false;
document.getElementById('panel-toggle').onclick = () => {
  panelOpen = !panelOpen;
  panel.classList.toggle('open', panelOpen);
  document.getElementById('panel-toggle').textContent = panelOpen ? '▼' : '▲';
};

/* auto-open panel on first slide change */
let autoOpened = false;

function buildNoteIndex(sections) {
  const map = {};
  sections.forEach((sec, i) => {
    const lbl = sec.getAttribute('data-screen-label') || '';
    map[i] = NOTES.find(n => n.label === lbl) || null;
  });
  return map;
}

let currentIndex = 0;
let noteMap = {};

function renderNotes(index) {
  currentIndex = index;
  const note = noteMap[index];
  const sections = document.querySelectorAll('x-import section');
  const lbl = sections[index]?.getAttribute('data-screen-label') || `Slide ${index + 1}`;

  document.getElementById('panel-slide-label').textContent =
    `${index + 1} / ${sections.length}  ·  ${lbl}`;

  if (!note) {
    document.getElementById('panel-time').textContent = '';
    document.getElementById('panel-keys').innerHTML = '<li class="panel-empty">No notes for this slide.</li>';
    document.getElementById('panel-prompt').innerHTML = '<span class="panel-empty">—</span>';
    document.getElementById('panel-tip').innerHTML = '<span class="panel-empty">—</span>';
    return;
  }

  document.getElementById('panel-time').textContent = `⏱ ${note.time} min`;
  document.getElementById('panel-keys').innerHTML =
    note.keys.map(k => `<li>${k}</li>`).join('');
  document.getElementById('panel-prompt').innerHTML = note.prompt
    ? `<div class="panel-prompt">${note.prompt}</div>`
    : '<span class="panel-empty">No discussion prompt.</span>';
  document.getElementById('panel-tip').innerHTML = note.tip
    ? `<div class="panel-tip">${note.tip}</div>`
    : '<span class="panel-empty">No delivery tip.</span>';

  /* auto-open on first navigation */
  if (!autoOpened) {
    panelOpen = true;
    panel.classList.add('open');
    document.getElementById('panel-toggle').textContent = '▼';
    autoOpened = true;
  }

  /* sync audience window */
  ch.postMessage({ index });
}

/* Watch for active slide changes */
window.addEventListener('load', () => {
  const sections = [...document.querySelectorAll('x-import section')];
  noteMap = buildNoteIndex(sections);

  /* render notes for slide 0 immediately */
  renderNotes(0);

  /* IntersectionObserver — works with scroll-snap and CSS-driven navigation */
  const io = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const idx = sections.indexOf(entry.target);
        if (idx >= 0 && idx !== currentIndex) renderNotes(idx);
      }
    });
  }, { threshold: 0.6 });

  sections.forEach(s => io.observe(s));

  /* MutationObserver fallback for data-active attribute (deck-stage.js) */
  const mo = new MutationObserver(() => {
    const activeIdx = sections.findIndex(
      s => s.hasAttribute('data-active') || s.classList.contains('active')
    );
    if (activeIdx >= 0 && activeIdx !== currentIndex) renderNotes(activeIdx);
  });
  const root = document.querySelector('x-import');
  if (root) mo.observe(root, { attributes: true, subtree: true, attributeFilter: ['data-active', 'class'] });
});

})();
</script>
